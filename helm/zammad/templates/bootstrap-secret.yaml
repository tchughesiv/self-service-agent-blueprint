apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-admin-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: zammad-bootstrap
type: Opaque
stringData:
  email: {{ .Values.bootstrap.adminEmail | quote }}
  password: {{ .Values.bootstrap.adminPassword | quote }}
