apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: zammad-bootstrap
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: zammad-bootstrap
    spec:
      restartPolicy: OnFailure
      {{- if .Values.bootstrap.createToken }}
      serviceAccountName: {{ .Release.Name }}-zammad-bootstrap
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zammad-bootstrap
          image: "{{ .Values.bootstrap.imageRegistry }}/{{ .Values.bootstrap.imageRepository }}:{{ .Values.bootstrap.imageTag }}"
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          command: ["python3", "/app/bootstrap.py"]
          env:
            - name: ZAMMAD_BASE_URL
              value: "http://{{ default .Release.Name .Values.zammad.fullnameOverride }}-nginx:8080"
            - name: ZAMMAD_AUTOWIZARD_TOKEN
              value: {{ .Values.bootstrap.autowizardToken | quote }}
            - name: ZAMMAD_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-admin-credentials
                  key: email
            - name: ZAMMAD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-admin-credentials
                  key: password
            {{- if .Values.bootstrap.createToken }}
            - name: ZAMMAD_CREATE_TOKEN
              value: "true"
            - name: ZAMMAD_CREDENTIALS_SECRET
              value: {{ .Values.bootstrap.credentialsSecret | quote }}
            - name: ZAMMAD_MCP_DEPLOYMENT
              value: {{ .Values.bootstrap.mcpDeployment | quote }}
            - name: ZAMMAD_INTEGRATION_DISPATCHER_DEPLOYMENT
              value: {{ .Values.bootstrap.integrationDispatcherDeployment | quote }}
            {{- end }}
{{- $iw := .Values.bootstrap.integrationWebhook | default dict }}
{{- if $iw.enabled }}
{{- $rel := $iw.mainChartReleaseName | default "self-service-agent" }}
{{- $defaultUrl := printf "http://%s-integration-dispatcher.%s.svc.cluster.local/zammad/webhook" $rel .Release.Namespace }}
{{- $url := $iw.url | default $defaultUrl }}
            - name: ZAMMAD_INTEGRATION_WEBHOOK_URL
              value: {{ $url | quote }}
{{- $plainHmac := default "" $iw.hmacSecret }}
{{- if $plainHmac }}
            - name: ZAMMAD_WEBHOOK_SECRET
              value: {{ $plainHmac | quote }}
{{- else }}
{{- $href := $iw.hmacSecretRef | default dict }}
{{- $parentChartName := $rel }}
{{- $pfn := .Release.Name }}
{{- if not (contains $parentChartName .Release.Name) }}
{{- $pfn = printf "%s-%s" .Release.Name $parentChartName | trunc 63 | trimSuffix "-" }}
{{- end }}
{{- $defaultIntSec := printf "%s-integration-secrets" $pfn }}
{{- $hrefName := $href.name | default $defaultIntSec }}
            - name: ZAMMAD_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $hrefName | quote }}
                  key: {{ $href.key | default "zammad-webhook-secret" | quote }}
                  optional: true
{{- end }}
{{- if ($iw.triggerGroupNames | default "") }}
            - name: ZAMMAD_TRIGGER_GROUP_NAMES
              value: {{ $iw.triggerGroupNames | quote }}
{{- end }}
{{- if ($iw.triggerGroupIds | default "") }}
            - name: ZAMMAD_TRIGGER_GROUP_IDS
              value: {{ $iw.triggerGroupIds | quote }}
{{- end }}
{{- if ($iw.triggerTagsAny | default "") }}
            - name: ZAMMAD_TRIGGER_TAGS_ANY
              value: {{ $iw.triggerTagsAny | quote }}
{{- end }}
{{- if ($iw.triggerTagsAll | default "") }}
            - name: ZAMMAD_TRIGGER_TAGS_ALL
              value: {{ $iw.triggerTagsAll | quote }}
{{- end }}
{{- if $iw.triggerSkipGroupFilter }}
            - name: ZAMMAD_TRIGGER_SKIP_GROUP_FILTER
              value: "true"
{{- end }}
{{- end }}
