{{- if and .Values.requestManagement.enabled .Values.requestManagement.requestManager.externalAccess.enabled }}
---
# OpenShift Route for direct external access to Request Manager
# This provides simple external access via OpenShift Routes
# Agent Service and Integration Dispatcher remain cluster-internal
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ssa-request-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "self-service-agent.labels" . | nindent 4 }}
    app: {{ include "self-service-agent.fullname" . }}-request-manager
    component: request-manager
  annotations:
    # OpenShift Route for external access
    # Extended timeout for synchronous API endpoints (default is 30s)
    haproxy.router.openshift.io/timeout: "180s"
spec:
  to:
    kind: Service
    name: {{ include "self-service-agent.fullname" . }}-request-manager
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

{{- if and .Values.requestManagement.enabled .Values.requestManagement.integrationDispatcher.externalAccess.enabled }}
---
# Path-restricted Route: Only Slack webhook endpoints are externally accessible
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ssa-integration-dispatcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "self-service-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: integration-dispatcher
  annotations:
    haproxy.router.openshift.io/timeout: "180s"
spec:
  path: /slack
  to:
    kind: Service
    name: {{ include "self-service-agent.fullname" . }}-integration-dispatcher
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

{{- if and .Values.zammad.enabled .Values.zammad.externalRoute.enabled }}
---
# OpenShift Route for Zammad Web UI (ticketing channel)
# Targets zammad-nginx service created by Zammad chart (deploy-zammad)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ssa-zammad
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "self-service-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: zammad
  annotations:
    haproxy.router.openshift.io/timeout: "300s"
spec:
  to:
    kind: Service
    name: {{ .Values.zammad.externalRoute.serviceName | default "zammad-nginx" }}
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}

{{- if and .Values.zammad.enabled .Values.zammad.embedPage.enabled }}
---
# OpenShift Route for Zammad chat widget embed page (snippet + live preview)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ssa-zammad-embed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "self-service-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: zammad-embed
spec:
  to:
    kind: Service
    name: {{ include "self-service-agent.fullname" . }}-zammad-embed
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
