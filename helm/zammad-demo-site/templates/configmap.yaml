{{- if .Values.enabled }}
{{- $zammadUrl := .Values.publicUrl | default "" | trimSuffix "/" }}
{{- if not $zammadUrl }}
{{-   $host := include "zammad-demo-site.zammadHost" . | trim }}
{{-   if $host }}
{{-     $zammadUrl = printf "https://%s" $host }}
{{-   else }}
{{-     $zammadUrl = "https://YOUR-ZAMMAD-URL" }}
{{-   end }}
{{- end }}
{{- $pp := include "zammad-demo-site.normalizePathPrefix" .Values.pathPrefix }}
{{- $ppSlash := printf "%s/" (trimSuffix "/" $pp) }}
{{- $routeHost := include "zammad-demo-site.zammadHost" . | trim }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: zammad-demo-site
data:
  index.html: |
{{ include "zammad-demo-site.demoSiteIndex" (dict "zammadUrl" $zammadUrl "Values" .Values "Release" .Release) | nindent 4 }}
  chat-snippet.html: |
{{ include "zammad-demo-site.chatSnippetPage" (dict "zammadUrl" $zammadUrl "Values" .Values) | nindent 4 }}
  default.conf: |
    server {
        listen 8080;
        server_name {{ if $routeHost }}{{ $routeHost }}{{ else }}_{{ end }};
        # Route edge TLS; pod sees HTTP on :8080—avoid absolute redirects with wrong scheme/port.
        port_in_redirect off;
        absolute_redirect off;
        server_name_in_redirect off;
        # Internal rewrite only (no 301 to client): /demo-portal → /demo-portal/
        location = {{ $pp }} {
            rewrite '{{ printf "^%s$" $pp }}' '{{ $ppSlash }}' last;
        }
        location {{ $ppSlash }} {
            alias /usr/share/nginx/html/;
            index index.html;
        }
    }
{{- end }}
