---
# Teardown SSA demo
# Deletes namespace and all resources. Usage: make ansible-teardown-demo NAMESPACE=<ns>
# Usage: ansible-playbook ansible/playbooks/teardown-demo-manifests.yml -e "target_namespace=<ns>"

- name: Teardown SSA demo
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Delete demo namespace (removes all resources)
      ansible.builtin.command:
        cmd: "kubectl delete namespace {{ target_namespace | default('ssa-demo') }} --ignore-not-found --timeout=120s"
      changed_when: true
      register: delete_ns
      failed_when: false

    - name: Teardown complete
      ansible.builtin.debug:
        msg: "Demo namespace {{ target_namespace | default('ssa-demo') }} removed (or did not exist)."
